name: Daily AI Automation Log

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create daily log
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p logs
          echo "# Daily AI Automation Log - $DATE" > logs/$DATE.md
          echo "" >> logs/$DATE.md
          echo "## Focus" >> logs/$DATE.md
          echo "- AI automation practice" >> logs/$DATE.md
          echo "- LLM workflow improvement" >> logs/$DATE.md
          echo "- API / webhook / n8n learning" >> logs/$DATE.md
          echo "" >> logs/$DATE.md
          echo "## Notes" >> logs/$DATE.md
          echo "- Updated daily AI automation progress log." >> logs/$DATE.md
          echo "- Practiced or reviewed AI workflows, prompt engineering, API integrations, or automation systems." >> logs/$DATE.md
          echo "" >> logs/$DATE.md
          echo "## Tools" >> logs/$DATE.md
          echo "- n8n" >> logs/$DATE.md
          echo "- OpenAI / Claude" >> logs/$DATE.md
          echo "- APIs" >> logs/$DATE.md
          echo "- CRM automation" >> logs/$DATE.md
          echo "- Webhooks" >> logs/$DATE.md
          echo "" >> logs/$DATE.md
          echo "## Progress" >> logs/$DATE.md
          echo "- Maintained daily learning and project activity." >> logs/$DATE.md

      - name: Update README timestamp
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "# Daily AI Automation Log" > README.md
          echo "" >> README.md
          echo "This repository tracks my daily progress in AI automation, LLM workflows, APIs, n8n, and agentic systems." >> README.md
          echo "" >> README.md
          echo "## Latest Update" >> README.md
          echo "Last updated: $DATE" >> README.md

      - name: Commit and push changes
        run: |
          git config --global user.name "MichiCapurno01"
          git config --global user.email "michicapurno01@gmail.com"
          git add .
          git commit -m "Update daily AI automation log" || echo "No changes to commit"
          git push
